services:
  phowhisper-api:
    build: .
    # Không khai báo `image:` trỏ tên Hub — Portainer `compose pull` sẽ cố kéo phowhisper-asr và lỗi "denied".
    # Image được tag tự động dạng <tên_stack>_phowhisper-api sau khi build.
    pull_policy: build
    ports:
      - "8023:8000"
    environment:
      # Trùng volume bên dưới; không dùng TRANSFORMERS_CACHE (deprecated từ Transformers v5)
      HF_HOME: /cache/huggingface
      PHOWHISPER_MODEL: ${PHOWHISPER_MODEL:-vinai/PhoWhisper-small}
      PRELOAD_MODEL: "1"
      MAX_UPLOAD_MB: "100"
      # HF_TOKEN: ""  # nếu model private / gate
      CORS_ORIGINS: "*"
    volumes:
      # Giữ model sau lần tải đầu — quan trọng khi restart container
      - hf_cache:/cache/huggingface
    restart: unless-stopped
    # Mặc định small ~2–4GB+ RAM; đổi PHOWHISPER_MODEL=large thì nên 8G+
    deploy:
      resources:
        limits:
          memory: 6G
        reservations:
          memory: 2G

volumes:
  hf_cache:
