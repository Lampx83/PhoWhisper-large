services:
  phowhisper-api:
    build: .
    image: phowhisper-asr:latest
    ports:
      - "8023:8000"
    environment:
      PHOWHISPER_MODEL: vinai/PhoWhisper-large
      PRELOAD_MODEL: "1"
      MAX_UPLOAD_MB: "100"
      # HF_TOKEN: ""  # nếu model yêu cầu (PhoWhisper-large hiện không gate)
      CORS_ORIGINS: "*"
    volumes:
      # Giữ model sau lần tải đầu — quan trọng khi restart container
      - hf_cache:/cache/huggingface
    restart: unless-stopped
    # PhoWhisper-large ~3GB+ RAM; tăng nếu OOM
    deploy:
      resources:
        limits:
          memory: 8G
        reservations:
          memory: 4G

volumes:
  hf_cache:
