# Máy chủ mạnh (GPU + nhiều RAM): build bằng Dockerfile.gpu và bật GPU.
# Chạy: docker compose -f docker-compose.yml -f docker-compose.gpu.yml up --build
#
# Yêu cầu: nvidia-container-toolkit, driver phù hợp CUDA 12.4 (PyTorch image).
services:
  phowhisper-api:
    pull_policy: build
    build:
      context: .
      dockerfile: Dockerfile.gpu
    environment:
      PHOWHISPER_MODEL: ${PHOWHISPER_MODEL:-vinai/PhoWhisper-large}
      TORCH_NUM_INTRAOP_THREADS: ${TORCH_NUM_INTRAOP_THREADS:-32}
      TORCH_NUM_INTEROP_THREADS: ${TORCH_NUM_INTEROP_THREADS:-4}
      OMP_NUM_THREADS: ${OMP_NUM_THREADS:-32}
      MKL_NUM_THREADS: ${MKL_NUM_THREADS:-32}
      NUMEXPR_NUM_THREADS: ${NUMEXPR_NUM_THREADS:-32}
      NVIDIA_TF32_OVERRIDE: ${NVIDIA_TF32_OVERRIDE:-1}
    gpus: all
    deploy:
      resources:
        limits:
          memory: ${PHO_DEPLOY_MEM_LIMIT:-200G}
        reservations:
          memory: ${PHO_DEPLOY_MEM_RESERVE:-32G}
